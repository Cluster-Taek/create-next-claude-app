name: Sync main → simple

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into simple
        id: merge
        run: |
          git checkout simple
          if git merge origin/main --no-edit; then
            echo "conflict=false" >> $GITHUB_OUTPUT
            git push origin simple
          else
            git merge --abort
            echo "conflict=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR on conflict
        if: steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --base simple --head main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, skipping"
          else
            gh pr create \
              --title "🔄 Sync main → simple (conflict)" \
              --body "$(cat <<'EOF'
          ## Auto-sync failed

          `main` → `simple` 자동 병합 중 충돌이 발생했습니다.

          ### 해결 방법
          ```bash
          git checkout simple
          git merge origin/main
          # 충돌 해결 후
          git add .
          git commit
          git push origin simple
          ```

          🤖 Generated by GitHub Actions
          EOF
          )" \
              --base simple \
              --head main
          fi
